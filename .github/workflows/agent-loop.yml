name: Agent Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  models: read

concurrency:
  group: agent-loop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  agent-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AI_API_URL: ${{ secrets.AI_API_URL }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      AI_TEMPERATURE: ${{ secrets.AI_TEMPERATURE }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUTF8: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install automation dependencies
        run: python -m pip install requests

      - name: Validate AI configuration
        shell: bash
        run: |
          test -n "$GITHUB_TOKEN"

      - name: Run agent loop
        id: agent_loop
        run: python scripts/run_agent_loop.py

      - name: Upload agent loop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.agent_loop.outputs.artifact_name }}
          path: reports/
          if-no-files-found: error
